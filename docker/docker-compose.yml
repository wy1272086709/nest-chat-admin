name: nest-admin-deps

networks:
  default:
    name: common-network

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  redis:
    image: redis:${REDIS_VERSION_TAG:-7}
    restart: always
    env_file:
      - ../${ENV_FILE:-.env}
    command:
      - sh
      - -c
      - redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
    volumes:
      - ./redis-data/:/var/lib/redis/data/
    ports:
      - '${REDIS_HOST_BIND:-127.0.0.1}:6379:6379'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'test "$$(redis-cli -a "$${REDIS_PASSWORD}" --no-auth-warning ping)" = "PONG"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  rabbitmq:
    image: rabbitmq:${RABBITMQ_VERSION_TAG:-3-management}
    restart: always
    env_file:
      - ../${ENV_FILE:-.env}
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-${ADMIN_LOGIN:-admin}}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-${ADMIN_PASSWORD:-123456}}
    volumes:
      - ./rabbitmq-data/:/var/lib/rabbitmq/data/
      - ./rabbitmq-log/:/var/log/rabbitmq/
    ports:
      - '${RABBITMQ_HOST_BIND:-127.0.0.1}:5672:5672'
      - '${RABBITMQ_HOST_BIND:-127.0.0.1}:15672:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
