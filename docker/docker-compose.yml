name: nest-admin-deps

networks:
  default:
    name: common-network

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  minio:
    image: elestio/minio:${MINIO_VERSION_TAG:-latest}
    restart: always
    env_file:
      - ../${ENV_FILE:-.env}
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-${ADMIN_LOGIN:-admin}}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-${ADMIN_PASSWORD:-admin123456}}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-http://47.122.112.109:9001}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-http://47.122.112.109:9000}
    command: server /data --console-address ':9001'
    volumes:
      - ./minio-data/:/var/lib/minio/data/
    ports:
      - '9000:9000'
      - '9001:9001'
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

  redis:
    image: redis:${REDIS_VERSION_TAG:-7}
    restart: always
    env_file:
      - ../${ENV_FILE:-.env}
    command:
      - sh
      - -c
      - redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
    volumes:
      - ./redis-data/:/var/lib/redis/data/
    ports:
      - '6379:6379'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'test "$$(redis-cli -a "$${REDIS_PASSWORD}" --no-auth-warning ping)" = "PONG"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  rabbitmq:
    image: rabbitmq:${RABBITMQ_VERSION_TAG:-3-management}
    restart: always
    env_file:
      - ../${ENV_FILE:-.env}
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-${ADMIN_LOGIN:-admin}}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-${ADMIN_PASSWORD:-123456}}
    volumes:
      - ./rabbitmq-data/:/var/lib/rabbitmq/data/
      - ./rabbitmq-log/:/var/log/rabbitmq/
    ports:
      - '5672:5672'
      - '15672:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
